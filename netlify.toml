[build]
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://ctf.techinfo.uz/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://ctf.techinfo.uz/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
